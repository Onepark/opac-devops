[tools]
uv      = "latest"
awscli  = "latest"
doppler = "latest"
"ubi:common-fate/granted" = "latest"

[tasks.trigger]
description = "Trigger the data step function (drifting / anonymisation)"
run = "uv run trigger_step_function.py"

[tasks.bastion]
description = "Open an SSM port-forwarding tunnel to a private RDS instance"
run = "uv run bastion_connect.py"

[tasks.ecs-exec]
description = "Exec into a running ECS container (interactive cluster/task selection)"
run = "uv run ecs_exec.py"
