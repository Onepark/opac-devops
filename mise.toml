[tools]
uv      = "latest"
awscli  = "latest"
doppler = "latest"
"ubi:common-fate/granted" = "latest"

[tasks.trigger]
description = "Trigger the test DB date-drifting step function"
run = "uv run test_db.py"

[tasks.bastion]
description = "Open an SSM port-forwarding tunnel to a private RDS instance"
run = "uv run bastion_connect.py"

[tasks.ecs-exec]
description = "Exec into a running ECS container (interactive cluster/task selection)"
run = "uv run ecs_exec.py"

[tasks.stg-db]
description = "Switch the staging DB cutover to the latest ready production-derived slot"
run = "uv run stg_db.py"
