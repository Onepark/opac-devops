[tools]
uv      = "latest"
awscli  = "latest"
doppler = "latest"
granted = "latest"

[tasks.trigger]
description = "Trigger the data step function (drifting / anonymisation)"
run = "uv run trigger_step_function.py"

[tasks.bastion]
description = "Open an SSM port-forwarding tunnel to a private RDS instance or ECS service"
run = "uv run bastion_connect.py"
